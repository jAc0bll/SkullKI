# Deep CFR — local config (for smoke tests and single-machine runs)
# Run: python -m skull_king.training.cfr.train

n_players: 4
env_seed: 42

n_cfr_iterations: 500
traversals_per_player: 200
num_workers: 1               # set > 1 on Linux; keep 1 on Windows for dev

net_hidden: [512, 512]

adv_lr: 1.0e-3
adv_batch_size: 512
adv_train_epochs: 5
adv_buffer_capacity: 2_000_000

strat_lr: 1.0e-3
strat_batch_size: 512
strat_train_epochs: 5
strat_buffer_capacity: 2_000_000

eval_every_n_iters: 50
checkpoint_every_n_iters: 100
model_dir: models/skull_king
run_name: cfr_v1

