# ReBeL training config — 2x RTX PRO 6000 S Blackwell + EPYC 9754
# Run:  python -m skull_king.training.rebel.train --config configs/rebel/rebel_v1.yaml
#
# PBS-CFR: single belief-weighted tree per decision, no determinization.
# Subgame depth = current round. Value net at round boundaries.
#
# Timing highly dependent on n_cfr_iters_per_subgame and games_per_iter.
# Benchmark first iter to calibrate.

n_players: 4
seed: 42

# Training loop
n_iterations: 1000
games_per_iter: 4

# Subgame solver
n_subgame_samples: 1          # unused in PBS-CFR (kept for API compat)
n_cfr_iters_per_subgame: 5    # CFR iters per decision node — start low, tune up

# Networks (larger than CFR nets — PBS encoding includes belief)
value_hidden: [512, 512, 256]
policy_hidden: [512, 512, 256]

# Optimization
value_lr: 1.0e-3
policy_lr: 1.0e-3
batch_size: 512
train_steps: 100
buffer_capacity: 200_000

# Logging
eval_every: 50
checkpoint_every: 100
model_dir: models/rebel
run_name: rebel_v1_4090
