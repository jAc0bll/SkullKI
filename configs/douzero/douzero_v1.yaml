# DouZero-Skull-King v1 — pure MC Q-learning with curriculum self-play
#
# Single GPU:
#   python -m skull_king.training.douzero.train --config configs/douzero/douzero_v1.yaml
#
# Multi-GPU (e.g. 4× RTX 4090):
#   torchrun --nproc_per_node=4 --master_port=29500 \
#       -m skull_king.training.douzero.train --config configs/douzero/douzero_v1.yaml
#
# Algorithm:
#   - Q(s, ·) network outputs Q-values per action; MC return as target.
#   - Curriculum: heuristic + random opponents early, more self + league late.
#   - League: rolling FIFO of past Q-net snapshots, used as opponents.
#   - Only seat-0 (live agent) transitions trained on; seats 1-3 act with
#     mixed opponents to provide diverse data distributions.

n_players: 4
seed: 42

# ── Training loop ───────────────────────────────────────────────────
n_iterations: 5000
collect_steps: 32768
n_envs: 2048

# ── Exploration ─────────────────────────────────────────────────────
epsilon_start: 0.10
epsilon_end:   0.01
epsilon_decay: 2500

# ── Curriculum (linear blend across n_iterations) ───────────────────
# Probability that each non-seat-0 seat plays as each opponent type.
self_start:      0.30
self_end:        0.70
league_start:    0.10
league_end:      0.25
heuristic_start: 0.40
heuristic_end:   0.05
random_start:    0.20
random_end:      0.00
league_capacity: 8
league_snapshot_every: 200

# ── Network ─────────────────────────────────────────────────────────
hidden: [1024, 1024, 512, 256]
compile_nets: true

# ── Optimization ────────────────────────────────────────────────────
lr: 5.0e-4
batch_size: 4096
train_steps: 250
buffer_capacity: 2_000_000
grad_clip: 1.0

# ── Logging ─────────────────────────────────────────────────────────
eval_every: 50
checkpoint_every: 250
model_dir: models/douzero
run_name: douzero_v1_4090

resume_from: ""
start_iter: 1
