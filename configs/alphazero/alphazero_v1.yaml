# AlphaZero-Skull-King v1 — multi-GPU optimized for 4× RTX 4090
#
# Single GPU:
#   python -m skull_king.training.alphazero.train --config configs/alphazero/alphazero_v1.yaml
#
# Multi-GPU (4 GPUs):
#   torchrun --nproc_per_node=4 --master_port=29500 \
#       -m skull_king.training.alphazero.train --config configs/alphazero/alphazero_v1.yaml
#
# With 4 ranks × 128 envs = 512 parallel games. Each iteration collects
# 2048 seat-0 decisions per rank (≈ 32 full games), running 80 MCTS sims
# per move. Effective game throughput ~30-60k self-play games/hour on
# 4× 4090.
#
# Algorithm:
#   - PUCT-MCTS with policy+value network
#   - π_target = root visit-count distribution (with Dirichlet noise)
#   - z_target = scaled per-round return-to-go in [-1, +1]
#   - Cross-entropy + MSE loss; temperature schedule for exploration

n_players: 4
seed: 42

# ── Training loop ───────────────────────────────────────────────────
# n_envs=512 + n_sims=10 is the sweet spot per single-GPU benchmark:
# 512 envs gives big GPU batches; 10 sims keeps engine work tractable
# (each MCTS sim runs the Python game engine many times — that's the
# real bottleneck, not GPU compute).
n_iterations: 3000
collect_decisions: 4096
n_envs: 512

# ── MCTS ────────────────────────────────────────────────────────────
# Training MCTS reduced to 10 sims for tractable iter time. The Python
# game engine is the bottleneck (each MCTS sim drives the engine through
# multiple opponent moves) — beyond ~10 sims iter time grows linearly
# without proportionally improving the policy targets.
n_simulations: 10
eval_simulations: 50
c_puct: 2.0
dirichlet_alpha: 0.3
dirichlet_eps: 0.25
temperature_initial: 1.0
temperature_final: 0.1
temperature_drop_iter: 500

# ── Network ─────────────────────────────────────────────────────────
hidden: [1024, 1024, 512]
value_hidden: 128

# ── Optimization ────────────────────────────────────────────────────
lr: 5.0e-4
weight_decay: 1.0e-4
batch_size: 4096
train_steps: 80
buffer_capacity: 1_000_000
value_loss_weight: 1.0
grad_clip: 1.0

# ── Logging ─────────────────────────────────────────────────────────
# Two-tier eval: fast policy-only every 25 iters, full MCTS every 200.
eval_every: 25
mcts_eval_every: 200
eval_games_fast: 100
eval_games_mcts: 30
checkpoint_every: 100
model_dir: models/alphazero
run_name: alphazero_v1_4090x4

resume_from: ""
start_iter: 1
