# Deep CFR — v8 split-network, RTX 4090 + AMD EPYC 7B13 (64c/128t)
# Run:  python -m skull_king.training.cfr.train --config cfr_config_v8_4090.yaml
#
# Changes vs v7:
#   - Win-bonus in utility (+0.5 to winner, zero-sum) → agent explicitly targets #1
#   - heuristic_frac: 0.4 → 0.6 → trains against stronger opponents
#
# Timing: same as v7 (~10s/it)
# Cost estimate: ~3000 iters × 10s ≈ 8.5h × $1/h = ~$8.50

n_players: 4
env_seed: 42

n_cfr_iterations: 3000
traversals_per_player: 2500    # 10k total
num_workers: 100

heuristic_frac: 0.6            # was 0.4 — harder opponents during training

split_nets: true
bid_hidden: [256, 256]
play_hidden: [512, 512]

adv_lr: 5.0e-4
adv_batch_size: 8192
adv_train_steps: 200
adv_buffer_capacity: 8_000_000

strat_lr: 5.0e-4
strat_batch_size: 8192
strat_train_steps: 200
strat_buffer_capacity: 8_000_000

eval_every_n_iters: 100
checkpoint_every_n_iters: 250
model_dir: models/skull_king
run_name: cfr_v8_4090
