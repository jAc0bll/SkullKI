# Deep CFR v4 — optimized PC config (Windows, 8-worker spawn, persistent pool)
# Run: python -m skull_king.training.cfr.train --config cfr_config_v4_pc.yaml
#
# Key fixes vs v3_pc:
#   - Advantage buffer NEVER cleared (was the main cause of training collapse)
#   - Persistent worker pool (no per-iteration spawn overhead on Windows)
#   - Fixed gradient steps per iteration (predictable wall-clock cost)
#
# Expected runtime: ~6-8h overnight on an 8-core Windows PC

n_players: 4
env_seed: 42

# 1500 iters x 400 traversals x 4 players = 2.4M game simulations
n_cfr_iterations: 1500
traversals_per_player: 400
num_workers: 8

net_hidden: [512, 512]

adv_lr: 5.0e-4
adv_batch_size: 1024
adv_train_steps: 600          # gradient steps per iteration
adv_buffer_capacity: 2_000_000

strat_lr: 5.0e-4
strat_batch_size: 1024
strat_train_steps: 600
strat_buffer_capacity: 4_000_000

eval_every_n_iters: 100
checkpoint_every_n_iters: 150
model_dir: models/skull_king
run_name: cfr_v4_pc
