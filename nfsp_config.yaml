# Skull King NFSP Training Config
# Run: python -m skull_king.training.nfsp_train
# Warm-start from existing model:
#   python -m skull_king.training.nfsp_train --from-model models/skull_king/final

# -- Environment --------------------------------------------------------------
n_players: 4
controlled_player: 0
reward_mode: shaped
env_seed: 42

# -- Curriculum ---------------------------------------------------------------
curriculum_start_mix: 0.80
curriculum_end_mix: 0.08

# -- Training loop ------------------------------------------------------------
total_timesteps: 10_000_000
n_envs: 12
self_play_update_freq: 25_000
eval_freq: 100_000
n_eval_episodes: 20
n_eval_games: 40
checkpoint_freq: 500_000

# -- Output -------------------------------------------------------------------
log_dir: logs/skull_king
model_dir: models/skull_king
run_name: nfsp_v1

# -- PPO Hyperparameters ------------------------------------------------------
learning_rate: 3.0e-4
n_steps: 2048
batch_size: 512
n_epochs: 10
gamma: 0.997
gae_lambda: 0.95
clip_range: 0.20
ent_coef: 0.03
vf_coef: 0.5
max_grad_norm: 0.5
net_arch: [512, 512]

# -- NFSP Hyperparameters -----------------------------------------------------
# eta: prob that each opponent uses BR (frozen PPO) instead of avg strategy.
#   0.1 = 10% BR / 90% average strategy — standard NFSP value.
#   Lower = faster Nash convergence but weaker BR signal.
eta: 0.1

# Reservoir: uniform random sample of all past BR decisions.
#   2M entries ~ 500MB RAM. Reduce if memory is tight.
reservoir_capacity: 2_000_000

# SL network (average strategy) training.
sl_lr: 1.0e-3
sl_batch_size: 512
sl_n_updates: 8        # gradient steps per rollout
sl_hidden: [256, 256]
min_buffer_size: 5_000  # don't start SL training until reservoir has this many samples

# -- Smoke-test (uncomment to verify setup in ~60s) ---------------------------
