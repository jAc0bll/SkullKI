# Deep CFR -- H100 SXM config (224-vCPU node)
# Run:  python -m skull_king.training.cfr.train --config cfr_config_h100.yaml
#
# IPC bottleneck analysis (why fewer workers is better here):
#   Each traversal returns ~55 KB of numpy arrays through Unix pipes.
#   2000 traversals = 110 MB result IPC/iter -- fixed cost regardless of worker count.
#   Weight broadcast via Manager: num_workers x 1.7 MB/iter.
#     32 workers: 54 MB   (vs 64 workers: 108 MB)
#   Scheduling round-trips: len(tasks) // (num_workers*2) chunks
#     32 workers: ~31 chunks (vs 64 workers: ~15 chunks, but weight broadcast is 2x)
#
# Tuning (32 workers, C engine ~8ms/traversal, H100 for net training):
#   weight broadcast: 32 x 1.7 MB / ~200 MB/s =~ 0.3s
#   worker compute:   62 tasks/worker x 8ms    =~ 0.5s
#   result IPC:       110 MB / ~200 MB/s        =~ 0.5s
#   net training:     2000 steps x batch 4096   =~ 1-2s  (H100)
#   total:            ~2-3s/iter x 2500 = ~1.5h
#
# Memory budget:
#   adv_buf  (5M x 1392 B) =~  7 GB
#   strat_buf (8M x 1384 B) =~ 11 GB
#   total =~ 23 GB

n_players: 4
env_seed: 42

n_cfr_iterations: 2500
traversals_per_player: 500    # 2000 total; 110 MB IPC/iter
num_workers: 32               # sweet spot: weight broadcast + scheduling overhead

heuristic_frac: 0.4

net_hidden: [512, 512]

adv_lr: 5.0e-4
adv_batch_size: 4096
adv_train_steps: 2000         # H100 does 2000 steps in ~1s
adv_buffer_capacity: 5_000_000

strat_lr: 5.0e-4
strat_batch_size: 4096
strat_train_steps: 2000
strat_buffer_capacity: 8_000_000

eval_every_n_iters: 100
checkpoint_every_n_iters: 250
model_dir: models/skull_king
run_name: cfr_v6_h100
