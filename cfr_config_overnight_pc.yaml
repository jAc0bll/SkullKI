# Deep CFR — overnight PC config
# Run:  python -m skull_king.training.cfr.train --config cfr_config_overnight_pc.yaml
#
# Tuning rationale:
#   * Phase 1+2a optimisations land at ~35 ms/traversal single-threaded.
#     With 8 workers and 500 traversals/player × 4 = 2000 traversals/iter,
#     collection ≈ 35 ms × 2000 / 8 ≈ 8.7 s/iter.
#     Plus ~6 s for adv+strat training, plus ~1 s overhead → ~15 s/iter total.
#   * 2500 iterations × 15 s ≈ 10.5 h — comfortable overnight run.
#   * v2_server hit 90% WR vs Random by iter ~900; 2500 leaves plenty of
#     headroom for further convergence and gives 10 checkpoints to inspect.
#
# Memory budget:
#   adv_buf  (2M × 1392 B) ≈ 2.8 GB
#   strat_buf (3M × 1384 B) ≈ 4.2 GB
#   plus per-worker copies + torch ≈ ~10 GB peak.  Fits comfortably on 16 GB,
#   plenty of headroom on 32+ GB.
#
# If you want to stop early: Ctrl+C is safe (saves checkpoints every 250 iters).

n_players: 4
env_seed: 42

# 2500 iters × 500 traversals × 4 players = 5 M game simulations
n_cfr_iterations: 2500
traversals_per_player: 500
num_workers: 8

# 40% of opponent decisions use the HeuristicAgent (Fix C).
# Trains the agent against realistic play, breaking the self-play plateau.
heuristic_frac: 0.4

net_hidden: [512, 512]

adv_lr: 5.0e-4
adv_batch_size: 1024
adv_train_steps: 600          # adaptive scaler caps this when buffer is small
adv_buffer_capacity: 2_000_000

strat_lr: 5.0e-4
strat_batch_size: 1024
strat_train_steps: 600
strat_buffer_capacity: 3_000_000

eval_every_n_iters: 100        # 25 evals total — tracks WR vs random/heuristic
checkpoint_every_n_iters: 250  # 10 checkpoints to compare/roll back to
model_dir: models/skull_king
run_name: cfr_v6_heuristic
