# Skull King NFSP — Server Config (50 Threads)
# Run: python -m skull_king.training.nfsp_train --config nfsp_config_server.yaml
#
# Tuned for a ~50-thread CPU:
#   44 subprocesses (1 thread each) for game simulation
#   ~6 threads remaining for main process (PPO + SL gradient updates)

# -- Environment --------------------------------------------------------------
n_players: 4
controlled_player: 0
reward_mode: shaped
env_seed: 42

# -- Curriculum ---------------------------------------------------------------
curriculum_start_mix: 0.80
curriculum_end_mix: 0.08

# -- Training loop ------------------------------------------------------------
total_timesteps: 10_000_000
n_envs: 44                  # 44 parallel game envs — saturates ~44 CPU threads
n_steps: 1024               # smaller rollout window → more frequent PPO+SL updates
                            # 44 * 1024 = 45,056 samples per rollout (~222 rollouts total)
self_play_update_freq: 25_000
eval_freq: 200_000          # less frequent than local to minimise eval overhead
n_eval_episodes: 20
n_eval_games: 40
checkpoint_freq: 500_000    # 20 checkpoints over full run

# -- Output -------------------------------------------------------------------
log_dir: logs/skull_king
model_dir: models/skull_king
run_name: nfsp_v1_server

# -- PPO Hyperparameters ------------------------------------------------------
learning_rate: 3.0e-4
n_steps: 1024
batch_size: 1024            # scaled up proportionally with larger rollout
n_epochs: 10
gamma: 0.997
gae_lambda: 0.95
clip_range: 0.20
ent_coef: 0.03
vf_coef: 0.5
max_grad_norm: 0.5
net_arch: [512, 512]

# -- NFSP Hyperparameters -----------------------------------------------------
eta: 0.1
reservoir_capacity: 2_000_000
sl_lr: 1.0e-3
sl_batch_size: 1024
sl_n_updates: 16            # more SL updates per rollout (larger rollout = more data)
sl_hidden: [256, 256]
min_buffer_size: 10_000
