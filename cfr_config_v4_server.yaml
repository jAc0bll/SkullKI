# Deep CFR v4 — optimized server config (Linux, 44-worker fork, per-iteration pool)
# Run: python3 -m skull_king.training.cfr.train --config cfr_config_v4_server.yaml
#
# Key improvements vs v2_server:
#   - Advantage buffer never cleared (main fix — was root cause of v3_pc collapse)
#   - Per-iteration fork pool: no IPC weight-broadcast overhead (persistent pool
#     was sending ~500 MB/iter to 44 workers via pipes — that caused 4 min/iter)
#   - 2x more traversals: richer advantage samples per iteration
#   - Fixed gradient steps: predictable wall-clock cost per iteration
#
# Expected runtime: ~4-6h on a 44-core Linux server

n_players: 4
env_seed: 42

# 1500 iters x 400 traversals x 4 players = 2.4M game simulations
n_cfr_iterations: 1500
traversals_per_player: 400
num_workers: 44

net_hidden: [512, 512]

adv_lr: 5.0e-4
adv_batch_size: 1024
adv_train_steps: 300
adv_buffer_capacity: 2_000_000

strat_lr: 5.0e-4
strat_batch_size: 1024
strat_train_steps: 300
strat_buffer_capacity: 4_000_000

eval_every_n_iters: 100
checkpoint_every_n_iters: 150
model_dir: models/skull_king
run_name: cfr_v4_server
