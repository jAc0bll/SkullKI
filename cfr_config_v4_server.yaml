# Deep CFR v4 — optimized server config (Linux, 44-worker persistent pool)
# Run: python3 -m skull_king.training.cfr.train --config cfr_config_v4_server.yaml
#
# Perf fixes vs previous attempts:
#   - Persistent pool (created once before buffers fill) eliminates ~50s/iter
#     COW page-table fork cost that hit once buffers reached 8 GB of dirty data
#   - torch.set_num_threads(8) in main process: cuts adv+strat training from
#     ~14s to ~3s/iter (28 threads was overkill for [512,512] batch-1024 matmuls)
#   - 200 traversals/player (same as v2_server) — buffer accumulation makes up
#     for fewer fresh samples; circular buffer slides over last ~19 iterations
#
# Expected runtime: ~10-12s/iter → ~4-5h for 1500 iterations

n_players: 4
env_seed: 42

# 1500 iters x 200 traversals x 4 players = 1.2M game simulations
n_cfr_iterations: 1500
traversals_per_player: 200
num_workers: 44

net_hidden: [512, 512]

adv_lr: 5.0e-4
adv_batch_size: 1024
adv_train_steps: 300
adv_buffer_capacity: 2_000_000

strat_lr: 5.0e-4
strat_batch_size: 1024
strat_train_steps: 300
strat_buffer_capacity: 4_000_000

eval_every_n_iters: 100
checkpoint_every_n_iters: 150
model_dir: models/skull_king
run_name: cfr_v4_server
