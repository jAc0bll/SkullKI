# Deep CFR — PC config (20-core Windows, overnight run)
# Run: python -m skull_king.training.cfr.train --config cfr_config_pc.yaml

n_players: 4
env_seed: 123

# 1000 iters x 200 traversals x 4 players = 800 000 game simulations
# With 8 workers on Windows (spawn): ~6-8h overnight
n_cfr_iterations: 1000
traversals_per_player: 200
num_workers: 8

net_hidden: [512, 512]

adv_lr: 1.0e-3
adv_batch_size: 512
adv_train_epochs: 8
adv_buffer_capacity: 2_000_000

strat_lr: 1.0e-3
strat_batch_size: 512
strat_train_epochs: 8
strat_buffer_capacity: 2_000_000

eval_every_n_iters: 50
checkpoint_every_n_iters: 100
model_dir: models/skull_king
run_name: cfr_v3_pc
