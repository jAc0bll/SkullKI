# Deep CFR — v7 split-network, RTX 5090 RunPod config (~8h)
# Run:  python -m skull_king.training.cfr.train --config cfr_config_v7_5090.yaml
#
# Timing estimate (Linux fork, 60 workers, Python traversal):
#   Collection: 2000 traversals / 60 workers x ~28ms/traversal  =  ~0.9s
#   Net training: 4 nets x 3000 steps x batch 8192 on 5090      =  ~1.5s
#   IPC + overhead:                                              =  ~0.6s
#   Total:                                                       =  ~3s/iter
#   Budget: 8h = 28800s / 3s                                    =  ~9600 iters
#   Target:                                                      =  5000 iters

n_players: 4
env_seed: 42

n_cfr_iterations: 5000
traversals_per_player: 500
num_workers: 60       # set by setup_runpod.sh from nproc

heuristic_frac: 0.4

split_nets: true
bid_hidden: [256, 256]
play_hidden: [512, 512]

adv_lr: 5.0e-4
adv_batch_size: 8192          # large batch — 5090 has 34 GB, our nets are tiny
adv_train_steps: 3000         # more steps per iter to actually use the GPU
adv_buffer_capacity: 5_000_000

strat_lr: 5.0e-4
strat_batch_size: 8192
strat_train_steps: 3000
strat_buffer_capacity: 8_000_000

eval_every_n_iters: 100
checkpoint_every_n_iters: 250
model_dir: models/skull_king
run_name: cfr_v7_5090
