# Deep CFR — v7 split-network, RTX 5090 RunPod config
# Run:  python -m skull_king.training.cfr.train --config cfr_config_v7_5090.yaml
#
# Timing estimate (Linux fork, 60 workers, Python traversal):
#   CPU traversal:  12k traversals / 60 workers x 35ms  ≈  7s  (+IPC → ~10s)
#   GPU training:   3000 steps x 4 nets x batch 8192    ≈  10s
#   → ~50% GPU utilization (CPU game sim is the hard limit)
#
# Buffer sizing: need buf ≥ train_steps × (batch // 4) = 3000 × 2048 = 6.1M
#   8M × 4 bufs × ~1.5 KB/sample ≈ 48 GB — fine for 405 GB machine.
#   Fills in ~25 iters (12k traversals × ~25 play samples → 300k/iter).

n_players: 4
env_seed: 42

n_cfr_iterations: 2500
traversals_per_player: 3000    # 12k total; 60 workers × 35ms ≈ 7s/iter
num_workers: 60                 # leave 4 cores for main process + OS

heuristic_frac: 0.4

split_nets: true
bid_hidden: [256, 256]
play_hidden: [512, 512]

adv_lr: 5.0e-4
adv_batch_size: 8192            # saturates 5090 per step
adv_train_steps: 3000           # needs buf ≥ 6.1M to hit all 3000 steps
adv_buffer_capacity: 8_000_000  # ~48 GB total across 4 bufs; fills in ~25 iters

strat_lr: 5.0e-4
strat_batch_size: 8192
strat_train_steps: 3000
strat_buffer_capacity: 8_000_000

eval_every_n_iters: 100
checkpoint_every_n_iters: 250
model_dir: models/skull_king
run_name: cfr_v7_5090
