# Deep CFR — v7 split-network, RTX 5090 RunPod config
# Run:  python -m skull_king.training.cfr.train --config cfr_config_v7_5090.yaml
#
# Hardware: AMD EPYC 9354, ~16 vCPUs available, RTX 5090, 405 GB RAM
#
# Timing estimate (forkserver, 14 workers, 16 cores):
#   CPU traversal:  4k traversals / 14 workers x 35ms  ≈  10s
#   GPU training:   3000 steps x 4 nets x batch 4096   ≈   5s  (steady state)
#   → ~33% GPU util; CPU is the hard limit with 16 cores + Python traversal
#
# Buffer sizing: 3M × 4 bufs × ~1.2 KB/sample ≈ 14 GB
#   Fills in ~30 iters (4k traversals × ~25 play samples → 100k/iter).
#   At full: effective_steps = min(3000, 3M//1024) = 2929 steps.

n_players: 4
env_seed: 42

n_cfr_iterations: 2500
traversals_per_player: 1000    # 4k total; 14 workers × 35ms ≈ 10s/iter
num_workers: 14                 # match vCPU count — oversubscription kills perf

heuristic_frac: 0.4

split_nets: true
bid_hidden: [256, 256]
play_hidden: [512, 512]

adv_lr: 5.0e-4
adv_batch_size: 4096
adv_train_steps: 3000
adv_buffer_capacity: 3_000_000  # fills in ~30 iters; allows ~2929 steps at full

strat_lr: 5.0e-4
strat_batch_size: 4096
strat_train_steps: 3000
strat_buffer_capacity: 3_000_000

eval_every_n_iters: 100
checkpoint_every_n_iters: 250
model_dir: models/skull_king
run_name: cfr_v7_5090
