# Skull King RL Training — Local Machine Config
# Run: python -m skull_king.training.train
#
# Optimised for a typical consumer PC (4-16 cores).
# Expected runtime at 10M steps with n_envs=12: ~8-12h

# -- Environment --------------------------------------------------------------
n_players: 4
controlled_player: 0
reward_mode: shaped     # more frequent signals than "round"; rank bonus prevents bid=0 collapse
env_seed: 42

# -- Curriculum ---------------------------------------------------------------
# heuristic_mix is annealed from curriculum_start_mix → curriculum_end_mix.
# Starting high means the agent must beat well-playing opponents from the start
# instead of exploiting random-policy mistakes.
curriculum_start_mix: 0.80   # 80% heuristic opponents at step 0
curriculum_end_mix:   0.08   # 8% heuristic at end (mostly self-play refinement)

# heuristic_mix is overridden by curriculum_start_mix on startup — kept here
# as a fallback if you disable the curriculum callback manually.
heuristic_mix: 0.80

# -- Training loop ------------------------------------------------------------
total_timesteps: 10_000_000
n_envs: 12               # safe for 4-8 core machines; increase if you have more

self_play_update_freq: 25_000   # less frequent = more stable frozen opponent
eval_freq: 100_000
n_eval_episodes: 20
n_eval_games: 40
checkpoint_freq: 500_000

# Output directories
log_dir: logs/skull_king
model_dir: models/skull_king
run_name: ppo_v3_local

# -- PPO Hyperparameters ------------------------------------------------------
# n_steps * n_envs = rollout buffer size per update.
# 2048 * 12 = 24 576 steps before each gradient update — covers ~30+ full rounds.
learning_rate: 3.0e-4
n_steps: 2048
batch_size: 512          # larger batch = more stable gradients
n_epochs: 10
gamma: 0.997             # slightly higher — rewards 10 rounds into the future
gae_lambda: 0.95
clip_range: 0.20
ent_coef: 0.03           # less entropy than v2 (0.05); curriculum provides exploration
vf_coef: 0.5
max_grad_norm: 0.5
net_arch: [512, 512]

