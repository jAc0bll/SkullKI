# Skull King RL Training — Server Config (34 cores / 54 threads)
# Run: python -m skull_king.training.train --config server_config.yaml
#
# Optimised for a high-core-count server.
# SubprocVecEnv maps each env to its own OS process — true CPU parallelism.
# Expected runtime at 20M steps with n_envs=48: ~8-12h

# -- Environment --------------------------------------------------------------
n_players: 4
controlled_player: 0
reward_mode: shaped
env_seed: 42

# -- Curriculum ---------------------------------------------------------------
curriculum_start_mix: 0.80
curriculum_end_mix:   0.08
heuristic_mix: 0.80

# -- Training loop ------------------------------------------------------------
total_timesteps: 20_000_000   # 2x vs local — server makes this feasible in ~10h
n_envs: 48                    # ~1 process per physical thread; leave 6 threads for OS/model

# Rollout buffer: 2048 * 48 = 98 304 steps — covers ~120 full rounds per update.
# Larger buffer = better gradient estimates, slower updates (which is fine on fast server).
self_play_update_freq: 50_000  # scale with n_envs: more envs → more data between updates
eval_freq: 200_000
n_eval_episodes: 50
n_eval_games: 100              # more eval games → more reliable metrics
checkpoint_freq: 1_000_000

# Output directories
log_dir: logs/skull_king
model_dir: models/skull_king
run_name: ppo_v3_server

# -- PPO Hyperparameters ------------------------------------------------------
# Larger n_envs means more diverse experience per rollout.
# We can afford a bigger batch_size because we have more data per update.
learning_rate: 2.0e-4    # slightly lower than local — more stable with bigger batches
n_steps: 2048
batch_size: 1024          # bigger batch exploits the larger rollout buffer
n_epochs: 10
gamma: 0.997
gae_lambda: 0.95
clip_range: 0.20
ent_coef: 0.03
vf_coef: 0.5
max_grad_norm: 0.5
net_arch: [512, 512]
