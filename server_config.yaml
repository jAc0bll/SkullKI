# Skull King RL Training — Server Config (34 cores / 54 threads)
# Run: python -m skull_king.training.train --config server_config.yaml
#
# Key differences from local config:
#   n_envs: 34          — one process per physical core (no context-switch overhead)
#   torch.set_num_threads(1) — set in train.py to prevent thread oversubscription
#   self_play_update_freq: 250_000 — less frequent IPC (model serialisation is expensive)
#   batch_size: 1024    — larger batch exploits the bigger rollout buffer
#   total_timesteps: 20_000_000

# -- Environment --------------------------------------------------------------
n_players: 4
controlled_player: 0
reward_mode: shaped
env_seed: 42

# -- Curriculum ---------------------------------------------------------------
curriculum_start_mix: 0.80
curriculum_end_mix:   0.08
heuristic_mix: 0.80

# -- Training loop ------------------------------------------------------------
total_timesteps: 20_000_000

# n_envs = physical core count. More envs than cores causes context-switch
# overhead that kills throughput. 34 physical cores → n_envs=34.
n_envs: 34

# Rollout buffer per update: 2048 × 34 = 69 632 steps (~85 full rounds).
# self_play_update_freq must be >> n_steps to avoid sending the model (~3 MB)
# to all 34 subprocesses every rollout — that IPC overhead dominates otherwise.
self_play_update_freq: 250_000

eval_freq: 200_000
n_eval_episodes: 50
n_eval_games: 100
checkpoint_freq: 1_000_000

# Output directories
log_dir: logs/skull_king
model_dir: models/skull_king
run_name: ppo_v3_server

# -- PPO Hyperparameters ------------------------------------------------------
learning_rate: 2.0e-4
n_steps: 2048
batch_size: 1024
n_epochs: 10
gamma: 0.997
gae_lambda: 0.95
clip_range: 0.20
ent_coef: 0.03
vf_coef: 0.5
max_grad_norm: 0.5
net_arch: [512, 512]
